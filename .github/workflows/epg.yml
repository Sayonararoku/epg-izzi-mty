name: Generar EPG izzi Monterrey

on:
  # Cada 24 horas (05:00 UTC = 23:00 hora centro MX). Ajusta la hora si quieres.
  schedule:
    - cron: "0 5 * * *"
  # Permite ejecutarlo manualmente desde la pestaña Actions.
  workflow_dispatch:

# Necesario para que el workflow pueda hacer commit del EPG al repo.
permissions:
  contents: write

# Evita ejecuciones solapadas si una tarda más de lo normal.
concurrency:
  group: epg-monterrey
  cancel-in-progress: false

jobs:
  build-epg:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      EPG_OUTPUT_DIR: "."
      EPG_FILENAME: "izzimty.xml"
      EPG_DAYS: "7"
      EPG_REGION: "Monterrey"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Generar EPG
        run: python epg_monterrey.py

      - name: Commit del EPG al repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f izzimty.xml izzimty.xml.gz
          if git diff --cached --quiet; then
            echo "Sin cambios en el EPG; no se hace commit."
          else
            git commit -m "EPG actualizado $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
